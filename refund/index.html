<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>refund policy • allnightthinkingofyou.store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baskervville:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <style>
        .policy-hero {
            text-align: center;
            max-width: 500px;
            margin: 3rem auto 3rem auto;
            padding: 0 1rem;
        }
        
        .back-link {
            display: inline-block;
            text-decoration: none;
            color: var(--text-sepia);
            font-size: 0.85rem;
            font-style: italic;
            opacity: 0.5;
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
        }
        .back-link:hover {
            opacity: 1;
            color: var(--accent-rose);
            transform: translateX(-2px); 
        }

        .policy-hero h1 {
            font-size: 1.25rem;
            font-weight: 400;
            margin-bottom: 0.5rem;
            color: var(--text-sepia);
        }
        .policy-subtext {
            font-style: italic;
            font-size: 0.88rem;
            opacity: 0.6;
        }

        .white-editorial-card {
            padding: 0.2rem;
            overflow: hidden;
            position: relative;
            background: #ffffff;
        }

        .doc-embed-frame {
            width: 100%;
            height: 800px; 
            border: none;
            display: block;
        }

        @media (max-width: 600px) {
            .white-editorial-card {
                height: 600px;
            }
            .doc-embed-frame {
                width: 142% !important; 
                height: 142% !important; 
                transform: scale(0.7); 
                transform-origin: top left;
                position: absolute;
                top: 0;
                left: 0;
            }
        }
    </style>
</head>
<body>

    <main class="main-container fade-up delay-1">
        <section class="policy-hero">
            <a href="/order" class="back-link">← back to order</a>
            
            <h1>refund policy</h1>
            <p class="policy-subtext">returns, cancellations, and service agreement framework</p>
        </section>

        <div class="white-editorial-card">
            <iframe 
                src="https://docs.google.com/document/d/e/2PACX-1vQ3xOyXori_jTxdkoOxTqSSQDElQS50qhzgWkwibN1vXoT-Nb1TFM86f7i-onbyvhQSWUPqPTojBSRC/pub?embedded=true" 
                class="doc-embed-frame">
            </iframe>
        </div>
    </main>

    <footer class="site-footer fade-up delay-2">
        <p>allnightthinkingofyou@gmail.com ❤︎⁠ located in yangon, myanmar</p>
    </footer>

</body>
</html>
