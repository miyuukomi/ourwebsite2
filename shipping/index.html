<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n-title="page_title_shipping">♡ SHIPPING CALCULATOR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=LINE+Seed+JP:wght@300;400;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    
    <script src="/lang-switch.js"></script>
    <script src="/site-header.js"></script>
    <link rel="stylesheet" href="/style.css">
    
    <style>
       :root {
            --soft-blush: #fff5f6;
            --crisp-white: #ffffff;
            --frame-gold: #d5b4a9;
            --text-dark: #4a3b39;
            --text-muted: #8e7673;
        }

        body {
            background-color: var(--bg-porcelain, #fdfbf7);
            color: var(--text-dark);
            font-family: 'LINE Seed JP', sans-serif;
            font-size: 0.9rem;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        .main-container {
            max-width: 1000px;
            margin: 3rem auto 6rem auto;
            padding: 0 1.5rem;
        }

        .top-navigation-bar {
            margin-bottom: 2rem;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--text-dark);
            cursor: pointer;
            font-family: 'LINE Seed JP', sans-serif;
            font-weight: 700;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding-bottom: 3px;
            border-bottom: 1px solid var(--text-dark);
            text-decoration: none;
            display: inline-flex;
        }

        .shipping-header {
            text-align: center;
            margin-bottom: 3.5rem;
        }

        .editorial-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 400;
            color: var(--text-dark);
            margin: 0 0 0.5rem 0;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .shipping-subtext {
            font-family: 'LINE Seed JP', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            text-transform: lowercase;
            margin: 0 0 0.5rem 0;
        }

        .update-timestamp {
            font-family: 'LINE Seed JP', sans-serif;
            font-size: 0.7rem;
            color: var(--text-muted);
            opacity: 0.7;
            font-style: italic;
        }

        .calc-container {
            display: grid;
            grid-template-columns: 1.3fr 1fr;
            gap: 2.5rem;
            align-items: start;
        }

        @media (max-width: 860px) {
            .calc-container {
                grid-template-columns: 1fr;
                gap: 2rem;
            }
        }

        .white-editorial-card {
            background: var(--crisp-white);
            border: 1px solid var(--frame-gold);
            padding: 2rem;
            box-sizing: border-box;
        }

        .selection-section h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            font-weight: 400;
            margin-top: 0;
            margin-bottom: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-dark);
        }

        /* ─── FLOATING MOBILE ONLY BUTTON ─── */
        .floating-summary-trigger {
            display: none;
            position: fixed;
            bottom: 2rem;
            right: 1.5rem;
            background: var(--crisp-white);
            border: 1px solid var(--frame-gold);
            color: var(--text-dark);
            font-family: 'LINE Seed JP', sans-serif;
            font-weight: 700;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 0.6rem 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            z-index: 9999;
            box-shadow: 0 4px 15px rgba(74, 59, 57, 0.12);
            transition: transform 0.2s ease;
        }
        .floating-summary-trigger:active {
            transform: scale(0.96);
        }
        @media (max-width: 860px) {
            .floating-summary-trigger {
                display: block;
            }
        }
        
        .section-title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 2.5rem;
            margin-bottom: 1.2rem;
            border-top: 1px dashed var(--frame-gold);
            padding-top: 1.5rem;
        }

        .section-title-row h3 {
            margin: 0;
        }

        .clear-all-link {
            font-family: 'LINE Seed JP', sans-serif;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            cursor: pointer;
            text-transform: uppercase;
            background: none;
            border: none;
            padding: 0;
            border-bottom: 1px dashed var(--text-muted);
        }
        .clear-all-link:hover {
            color: var(--text-dark);
            border-bottom-color: var(--text-dark);
        }

        .country-selector {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .country-radio-card {
            flex: 1;
            border: 1px solid var(--frame-gold);
            background: var(--crisp-white);
            padding: 0.8rem 1rem;
            border-radius: 0px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-family: 'LINE Seed JP', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-dark);
            transition: all 0.2s ease;
        }
        .country-radio-card.active {
            border-color: var(--text-dark);
            background-color: var(--soft-blush) !important;
        }

        .radio-circle {
            width: 10px;
            height: 10px;
            border-radius: 0px;
            border: 1px solid var(--frame-gold);
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--crisp-white);
            flex-shrink: 0;
        }
        .country-radio-card.active .radio-circle,
        .goods-card.selected .radio-circle {
            border-color: var(--text-dark);
            background: var(--text-dark) !important;
        }

        .goods-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.25rem;
        }

        .goods-card {
            border: 1px solid transparent;
            border-bottom: 1px dashed var(--frame-gold);
            background: var(--crisp-white) !important;
            padding: 0.7rem 0.5rem;
            border-radius: 0px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.15s ease;
            user-select: none;
            box-sizing: border-box;
        }
        .goods-card.selected {
            background-color: var(--soft-blush) !important;
            border: 1px solid var(--frame-gold);
            border-bottom-style: solid;
        }

        .goods-clickable-wrapper {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            cursor: pointer;
            flex: 1;
        }
        .goods-info-block {
            display: flex;
            flex-direction: column;
            gap: 0.1rem;
        }
        .goods-name {
            font-family: 'LINE Seed JP', sans-serif;
            font-size: 0.88rem;
            font-weight: 400;
            color: var(--text-dark);
        }
        .goods-card.selected .goods-name {
            font-weight: 700;
        }
        .goods-price-tag {
            font-family: 'LINE Seed JP', sans-serif;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .quantity-widget {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            opacity: 0;
            visibility: hidden;
            transition: all 0.15s ease;
        }
        .goods-card.selected .quantity-widget {
            opacity: 1;
            visibility: visible;
        }
        .qty-action-btn {
            background: var(--crisp-white);
            border: 1px solid var(--frame-gold);
            width: 20px;
            height: 20px;
            border-radius: 0px;
            cursor: pointer;
            font-family: 'LINE Seed JP', sans-serif;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dark);
        }
        .qty-action-btn:hover {
            border-color: var(--text-dark);
        }
        .qty-current-value {
            font-family: 'LINE Seed JP', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            min-width: 14px;
            text-align: center;
            color: var(--text-dark);
        }

        .sticky-summary-panel {
            position: sticky;
            top: 2rem;
            height: fit-content;
        }
        .summary-card {
            background: var(--crisp-white);
            border: 1px solid var(--frame-gold);
            padding: 2rem;
            box-sizing: border-box;
        }
        .summary-title {
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            font-weight: 400;
            margin-top: 0;
            margin-bottom: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-dark);
            border-bottom: 1px solid var(--frame-gold);
            padding-bottom: 0.5rem;
        }
        .manifest-breakdown {
            max-height: 180px;
            overflow-y: auto;
            margin-bottom: 0.5rem;
        }
        .breakdown-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'LINE Seed JP', sans-serif;
            font-size: 0.82rem;
            margin-bottom: 0.6rem;
            color: var(--text-muted);
        }
        .breakdown-row span:last-child {
            font-weight: 700;
            color: var(--text-dark);
        }
        .total-box {
            border-top: 1px solid var(--frame-gold);
            padding-top: 1.2rem;
            margin-top: 1.2rem;
            text-align: right;
        }
        .total-label {
            font-family: 'LINE Seed JP', sans-serif;
            font-size: 0.72rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--text-muted);
            display: block;
        }
        .total-amount {
            font-family: 'LINE Seed JP', sans-serif;
            font-weight: 700;
            font-size: 1.4rem;
            color: var(--text-dark);
            display: block;
            margin-top: 0.2rem;
        }

        @media (max-width: 640px) {
            .main-container {
                margin: 2rem auto 4rem auto;
                padding: 0 1rem;
            }
            .editorial-title {
                font-size: 1.6rem;
            }
            .white-editorial-card, .summary-card {
                padding: 1.25rem;
            }
        }
    </style>
</head>
<body>

    <header id="global-header" class="site-header fade-up"></header>

    <main class="main-container fade-up delay-1">
        <div class="top-navigation-bar">
            <a href="/order" class="back-btn" data-i18n="shipping_return_link">← return to order selections</a>
        </div>

        <div class="shipping-header">
            <h1 class="editorial-title" data-i18n="shipping_main_title">shipping calculator</h1>
            <p class="shipping-subtext" data-i18n="shipping_main_subtitle">predict shipping costs before checkout</p>
            <div class="update-timestamp" id="live-date-stamp">last update: 06/20/2026</div>
        </div>

        <div class="calc-container fade-up delay-2">
            <div class="selection-section white-editorial-card">
                <h3 data-i18n="shipping_select_country_header">select a country</h3>
                <div class="country-selector">
                    <button type="button" class="country-radio-card active" id="btn-japan" onclick="setCountry('japan')">
                        <div class="radio-circle"></div>
                        <span data-i18n="shipping_country_jp">japan</span>
                    </button>
                    <button type="button" class="country-radio-card" id="btn-thailand" onclick="setCountry('thailand')">
                        <div class="radio-circle"></div>
                        <span data-i18n="shipping_country_th">thailand</span>
                    </button>
                </div>

                <div class="section-title-row">
                    <h3 data-i18n="shipping_select_goods_header">select the type of goods</h3>
                    <button type="button" class="clear-all-link" onclick="clearAllSelections()" data-i18n="shipping_clear_btn">clear choices</button>
                </div>
                <div class="goods-grid" id="goods-container"></div>
            </div>

            <div class="sticky-summary-panel" id="summary-panel">
                <div class="summary-card">
                    <h3 class="summary-title" data-i18n="shipping_summary_title">your summary</h3>
                    
                    <div class="manifest-breakdown" id="manifest-list"></div>

                    <div class="breakdown-row" style="border-top: 1px dashed var(--frame-gold); padding-top: 1rem; margin-top: 0.5rem;">
                        <span data-i18n="shipping_summary_base_label">base collection fee</span>
                        <span id="summary-base-fee">0 MMK</span>
                    </div>

                    <div class="total-box">
                        <span class="total-label" data-i18n="shipping_summary_total_label">total shipping costs</span>
                        <span class="total-amount" id="summary-grand-total">0 MMK</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <button type="button" class="floating-summary-trigger" onclick="scrollToSummary()">see summary ↓</button>

    <script>
        const baseFees = { japan: 9000, thailand: 4500 };

        const itemCatalog = [
            { id: 'standees', name: 'standees', jpPrice: 2500, thPrice: 1500 },
            { id: 'cards', name: 'cards', jpPrice: 1500, thPrice: 1000 },
            { id: 'shikishi', name: 'shikishi', jpPrice: 3000, thPrice: 1800 },
            { id: 'figures', name: 'figures', jpPrice: 35000, thPrice: 30000 },
            { id: 'minifigures', name: 'mini figures', jpPrice: 1900, thPrice: 1400 },
            { id: 'badges', name: 'pin badges', jpPrice: 1000, thPrice: 1000 },
            { id: 'plushies10', name: 'plushies (≤10cm)', jpPrice: 5000, thPrice: 4000 },
            { id: 'plushies20', name: 'plushies (20cm)', jpPrice: 9000, thPrice: 7000 },
            { id: 'plushies30', name: 'plushies (30cm)', jpPrice: 15000, thPrice: 13000 },
            { id: 'plushiesMore', name: 'plushies (>30cm)', jpPrice: 20000, thPrice: 20000 },
            { id: 'postcards', name: 'postcards', jpPrice: 1000, thPrice: 1000 },
            { id: 'manga', name: 'manga', jpPrice: 9000, thPrice: 8000 },
            { id: 'cd', name: 'cd', jpPrice: 3000, thPrice: 2000 },
            { id: 'cloth', name: 'cloth (towels)', jpPrice: 4000, thPrice: 2500 },
            { id: 'files', name: 'files', jpPrice: 1800, thPrice: 1100 },
            { id: 'stickers', name: 'stickers', jpPrice: 1200, thPrice: 800 },
            { id: 'plasticDisplay', name: 'plastic display cards', jpPrice: 2200, thPrice: 1400 },
            { id: 'acrylicItems', name: 'acrylic items', jpPrice: 2400, thPrice: 1600 },
            { id: 'toteBags', name: 'tote bags & pouches', jpPrice: 4800, thPrice: 3200 },
            { id: 'mochiMascots', name: 'mochi mascots / rounds', jpPrice: 2800, thPrice: 1900 },
            { id: 'other', name: 'other / custom size', jpPrice: 0, thPrice: 0 }
        ];

        let activeCountry = 'japan';
        let selectedItems = {}; 

        function scrollToSummary() {
            document.getElementById('summary-panel').scrollIntoView({ behavior: 'smooth' });
        }

        function applyLiveTimestamp() {
            const dateOptions = { year: 'numeric', month: 'long', day: 'numeric' };
            const customDate = new Date('2026-07-06'); 
            const formattedToday = customDate.toLocaleDateString('en-US', dateOptions);
            const prefix = window.getI18nText ? window.getI18nText('shipping_last_update') : "last update:";
            document.getElementById('live-date-stamp').innerText = `${prefix} ${formattedToday}`;
        }

        function generateGoodsGrid() {
            const container = document.getElementById('goods-container');
            container.innerHTML = '';

            itemCatalog.forEach(item => {
                const price = activeCountry === 'japan' ? item.jpPrice : item.thPrice;
                const isSelected = selectedItems[item.id] !== undefined;
                const currentQty = isSelected ? selectedItems[item.id] : 1;
                
                let translatedItemName = item.name;
                if (window.getI18nText) {
                    translatedItemName = window.getI18nText(`catalog_item_${item.id}`) || item.name;
                }

                const card = document.createElement('div');
                card.className = `goods-card ${isSelected ? 'selected' : ''}`;
                card.id = `card-${item.id}`;

                let costString = price === 0 ? 'pending quote' : '+' + price.toLocaleString() + ' mmk each';
                if (window.getI18nText && price === 0) {
                    costString = window.getI18nText('catalog_pending_quote') || 'pending quote';
                } else if (window.getI18nText) {
                    costString = `+${price.toLocaleString()} ${window.getI18nText('catalog_mmk_each') || 'mmk each'}`;
                }

                card.innerHTML = `
                    <div class="goods-clickable-wrapper" onclick="toggleItemSelect('${item.id}')">
                        <div class="radio-circle"></div>
                        <div class="goods-info-block">
                            <span class="goods-name">${translatedItemName}</span>
                            <span class="goods-price-tag">${costString}</span>
                        </div>
                    </div>
                    <div class="quantity-widget">
                        <button type="button" class="qty-action-btn" onclick="adjustQty('${item.id}', -1, event)">-</button>
                        <span class="qty-current-value" id="qty-display-${item.id}">${currentQty}</span>
                        <button type="button" class="qty-action-btn" onclick="adjustQty('${item.id}', 1, event)">+</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function setCountry(country) {
            activeCountry = country;
            document.getElementById('btn-japan').classList.toggle('active', country === 'japan');
            document.getElementById('btn-thailand').classList.toggle('active', country === 'thailand');
            generateGoodsGrid();
            calculateGrandTotal();
        }

        function toggleItemSelect(id) {
            const card = document.getElementById(`card-${id}`);
            if (selectedItems[id] !== undefined) {
                delete selectedItems[id];
                card.classList.remove('selected');
            } else {
                selectedItems[id] = 1;
                card.classList.add('selected');
                document.getElementById(`qty-display-${id}`).innerText = '1';
            }
            calculateGrandTotal();
        }

        function adjustQty(id, change, event) {
            if (event) event.stopPropagation();
            if (selectedItems[id] === undefined) return;
            let targetNewQty = selectedItems[id] + change;
            
            if (targetNewQty < 1) {
                delete selectedItems[id];
                document.getElementById(`card-${id}`).classList.remove('selected');
            } else {
                selectedItems[id] = targetNewQty;
                document.getElementById(`qty-display-${id}`).innerText = targetNewQty;
            }
            calculateGrandTotal();
        }

        function clearAllSelections() {
            selectedItems = {};
            const cards = document.querySelectorAll('.goods-card');
            cards.forEach(card => card.classList.remove('selected'));
            calculateGrandTotal();
        }

        function calculateGrandTotal() {
            let runningSum = baseFees[activeCountry];
            const manifestList = document.getElementById('manifest-list');
            const baseFeeDisplay = document.getElementById('summary-base-fee');
            const totalDisplay = document.getElementById('summary-grand-total');

            manifestList.innerHTML = '';
            baseFeeDisplay.innerText = `${baseFees[activeCountry].toLocaleString()} MMK`;

            Object.keys(selectedItems).forEach(itemId => {
                const itemMeta = itemCatalog.find(i => i.id === itemId);
                const itemPrice = activeCountry === 'japan' ? itemMeta.jpPrice : itemMeta.thPrice;
                const quantity = selectedItems[itemId];
                const itemTotalCost = itemPrice * quantity;

                runningSum += itemTotalCost;

                let itemNameTrans = itemMeta.name;
                if (window.getI18nText) {
                    itemNameTrans = window.getI18nText(`catalog_item_${itemMeta.id}`) || itemMeta.name;
                }

                let displayCost = itemPrice === 0 ? 'Pending Quote' : '+' + itemTotalCost.toLocaleString() + ' MMK';
                if (window.getI18nText && itemPrice === 0) {
                    displayCost = window.getI18nText('catalog_pending_quote') || 'Pending Quote';
                }

                const breakdownRow = document.createElement('div');
                breakdownRow.className = 'breakdown-row';
                breakdownRow.innerHTML = `
                    <span>${itemNameTrans} (x${quantity})</span>
                    <span>${displayCost}</span>
                `;
                manifestList.appendChild(breakdownRow);
            });

            totalDisplay.innerText = `${runningSum.toLocaleString()} MMK`;
        }

        window.addEventListener('DOMContentLoaded', () => {
            applyLiveTimestamp();
            generateGoodsGrid();
            calculateGrandTotal();
            
            document.addEventListener('languageChanged', () => {
                applyLiveTimestamp();
                generateGoodsGrid();
                calculateGrandTotal();
            });
        });
    </script>
</body>
</html>
