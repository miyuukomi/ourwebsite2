<header class="top-header-navigation">
    <div class="header-inner">
        <div class="sidebar-brand" data-i18n="sidebar_brand">happy shopping (˶◜ᵕ◝˶)</div>
        
        <nav class="sidebar-links">
            <a href="/" class="side-nav-btn nav-btn" data-page="/" data-i18n="nav_home">♡ homepage</a>
            <a href="/order" class="side-nav-btn nav-btn" data-page="/order" data-i18n="nav_order">♡ place order</a>
            <a href="/track" class="side-nav-btn nav-btn" data-page="/track" data-i18n="nav_track">♡ track order</a>
            <a href="/review" class="side-nav-btn nav-btn" data-page="/review" data-i18n="nav_review">♡ leave review</a>
            <a href="/tutorial" class="side-nav-btn nav-btn" data-page="/tutorial" data-i18n="nav_tutorial">♡ tutorials</a>   
            <a href="/contactus" class="side-nav-btn nav-btn" data-page="/contactus" data-i18n="nav_contactus">♡ contact us</a>
        </nav>

        <div class="lang-bookmark-trigger">
            <div class="lang-bookmark-tab-face">
                <span data-i18n="lang_trigger">•language•</span>
            </div>
            
            <div class="lang-bookmark-content">
                <div class="lang-dropdown-ribbon"></div>
                <div class="lang-bookmark-title" data-i18n="lang_switch_title">select language</div>
                <div class="lang-bookmark-buttons">
                    <button class="lang-pill-btn" data-lang="en">
                        <span class="btn-heart">♡</span> English
                    </button>
                    <button class="lang-pill-btn" data-lang="my">
                        <span class="btn-heart">♡</span> မြန်မာ
                    </button>
                    <button class="lang-pill-btn" data-lang="zh">
                        <span class="btn-heart">♡</span> 中文
                    </button>
                </div>
            </div>
        </div>  
    </div>
</header>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const trigger = document.querySelector('.lang-bookmark-trigger');
    const tabFace = document.querySelector('.lang-bookmark-tab-face');
    
    if (trigger && tabFace) {
        tabFace.addEventListener('click', (e) => {
            e.stopPropagation();
            trigger.classList.toggle('active-dropdown');
        });
        
        const content = document.querySelector('.lang-bookmark-content');
        if (content) {
            content.addEventListener('click', (e) => {
                e.stopPropagation();
            });
        }
    }
    document.addEventListener('click', (e) => {
        if (trigger && !trigger.contains(e.target)) {
            trigger.classList.remove('active-dropdown');
        }
    });
});
</script>
