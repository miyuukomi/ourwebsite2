<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>♡ checkout</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baskervville:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">


    <!-- THANK you chatgpt and gemini lolololollolol -->
    <style>
        .success-screen {
            text-align: center;
            max-width: 500px;
            margin: 10% auto;
            padding: 2rem;
        }
        .success-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            display: block;
        }
    </style>
</head>
<body>


    <div id="fillout-container" style="display: none; position:fixed;top:0px;left:0px;right:0px;bottom:0px;z-index: 9999;">
        <div data-fillout-id="miH8Yfew6Hus" data-fillout-embed-type="fullscreen" style="width:100%;height:100%;" data-fillout-inherit-parameters></div>

    </div>

    <div id="success-container" style="display: none;">
        <div class="success-screen">
            <span class="success-icon">✨</span>
            <h1 style="text-transform: lowercase;">order received!</h1>
            <p style="margin-bottom: 2rem; opacity: 0.8;">your cart has been processed. i'll review your receipt verification as soon as i get a break from classes!</p>
            <a href="/" class="order-btn" style="text-transform: lowercase;">back to home</a>
        </div>
    </div>


    <script src="/checkout.js"></script>
</body>
</html>
